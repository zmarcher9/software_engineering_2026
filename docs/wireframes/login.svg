  <rect width="800" height="500" fill="#0f172a"/>
  <text x="400" y="60" text-anchor="middle" fill="#34d399" font-size="14" letter-spacing="3">FLOWFUNDS</text>
  <rect x="220" y="100" width="360" height="340" rx="16" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="150" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">Log in</text>
