<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="560" fill="#0f172a"/>
  <text x="400" y="60" text-anchor="middle" fill="#34d399" font-size="14" letter-spacing="3">FLOWFUNDS</text>
  <rect x="220" y="100" width="360" height="400" rx="16" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="150" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">Sign up</text>
  <text x="400" y="175" text-anchor="middle" fill="#94a3b8" font-size="12">Log in tab | [ Sign up ] tab</text>

  <text x="250" y="215" fill="#cbd5e1" font-size="12">Email</text>
  <rect x="250" y="222" width="300" height="34" rx="6" fill="#0f172a" stroke="#475569"/>

  <text x="250" y="278" fill="#cbd5e1" font-size="12">Password (8+ chars, 1 letter, 1 number)</text>
  <rect x="250" y="285" width="300" height="34" rx="6" fill="#0f172a" stroke="#475569"/>

  <text x="250" y="341" fill="#cbd5e1" font-size="12">Confirm password</text>
  <rect x="250" y="348" width="300" height="34" rx="6" fill="#0f172a" stroke="#475569"/>

  <rect x="250" y="405" width="300" height="40" rx="8" fill="#10b981"/>
  <text x="400" y="430" text-anchor="middle" fill="#052e21" font-size="14" font-weight="600">Create account</text>

  <text x="400" y="470" text-anchor="middle" fill="#f87171" font-size="12">Field-level errors (e.g. "passwords do not match")</text>
  <text x="400" y="490" text-anchor="middle" fill="#64748b" font-size="12">Already have an account? Log in</text>
</svg>
